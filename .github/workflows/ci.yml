name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Lint, typecheck, test, build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DATABASE_PROVIDER: sqlite
      DATABASE_URL: file:./prisma/test.db
      AUTH_SECRET: ci-secret-32chars-min-1234567890abcd
      STORAGE_PROVIDER: local
      QUEUE_PROVIDER: memory
      NEXT_TELEMETRY_DISABLED: 1
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Validate Prisma schema
        run: npx prisma validate

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Lint
        run: npm run lint --if-present

      - name: Prettier check
        run: npm run format:check --if-present

      - name: Typecheck
        run: npm run typecheck --if-present

      - name: Unit tests
        run: npm run test --if-present -- --run

      - name: Push test schema (SQLite)
        run: npx prisma db push --skip-generate

      - name: Build (Next.js)
        run: npm run build

  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: build
    env:
      DATABASE_PROVIDER: sqlite
      DATABASE_URL: file:./prisma/test.db
      AUTH_SECRET: ci-secret-32chars-min-1234567890abcd
      AUTH_PROVIDER: local
      STORAGE_PROVIDER: local
      QUEUE_PROVIDER: memory
      NEXT_TELEMETRY_DISABLED: 1
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with: { node-version: 22, cache: npm }
      - run: npm ci --no-audit --no-fund
      - run: npx prisma generate
      - run: npx prisma db push --skip-generate
      - name: Seed demo users
        run: npm run db:seed
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      # Playwright config's webServer starts `npm run dev` (NODE_ENV=development)
      # so the session cookie doesn't require the `__Host-` HTTPS prefix.
      - name: Run Playwright tests
        run: npm run test:e2e
      - if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 7

  docker:
    name: Docker image (build only)
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build container image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/Dockerfile
          push: false
          tags: alshaya-ai-recruit:ci
          build-args: |
            DATABASE_PROVIDER=postgresql
          cache-from: type=gha
          cache-to: type=gha,mode=max
