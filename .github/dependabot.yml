version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '06:00'
      timezone: 'Asia/Dubai'
    open-pull-requests-limit: 10
    groups:
      next:
        patterns: ['next', '@next/*', 'eslint-config-next']
      radix:
        patterns: ['@radix-ui/*']
      testing:
        patterns: ['vitest', '@vitest/*', '@playwright/*', '@testing-library/*', 'playwright']
    labels: ['dependencies', 'automerge-candidate']

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
    labels: ['ci']

  - package-ecosystem: 'docker'
    directory: '/infra'
    schedule:
      interval: 'weekly'
    labels: ['docker', 'infra']
