apiVersion: apps/v1
kind: Deployment
metadata:
  name: alshaya-recruit
  namespace: alshaya-recruit
  labels:
    app: alshaya-recruit
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels: { app: alshaya-recruit }
  template:
    metadata:
      labels: { app: alshaya-recruit }
      annotations:
        prometheus.io/scrape: "false"
    spec:
      serviceAccountName: alshaya-recruit-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: app
          image: ghcr.io/your-org/alshaya-ai-recruit:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              name: http
          env:
            - { name: NODE_ENV, value: production }
            - { name: PORT, value: "3000" }
            - { name: HOSTNAME, value: "0.0.0.0" }
            - { name: DATABASE_PROVIDER, value: postgresql }
            - { name: STORAGE_PROVIDER, value: azure-blob }
            - { name: QUEUE_PROVIDER, value: service-bus }
          envFrom:
            - secretRef: { name: alshaya-recruit-secrets }
          resources:
            requests: { cpu: "250m", memory: "512Mi" }
            limits:   { cpu: "1500m", memory: "2Gi" }
          readinessProbe:
            httpGet: { path: /api/system/status, port: http }
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /api/system/status, port: http }
            initialDelaySeconds: 30
            periodSeconds: 30
          volumeMounts:
            - { name: uploads, mountPath: /app/uploads }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities: { drop: [ ALL ] }
      volumes:
        - name: uploads
          persistentVolumeClaim:
            claimName: alshaya-recruit-uploads
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: alshaya-recruit-sa
  namespace: alshaya-recruit
---
apiVersion: v1
kind: Service
metadata:
  name: alshaya-recruit
  namespace: alshaya-recruit
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app: alshaya-recruit
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: alshaya-recruit-uploads
  namespace: alshaya-recruit
spec:
  accessModes: [ "ReadWriteOnce" ]
  resources:
    requests: { storage: 20Gi }
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: alshaya-recruit
  namespace: alshaya-recruit
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "20m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
spec:
  ingressClassName: nginx
  tls:
    - hosts: [ "recruit.example.com" ]
      secretName: alshaya-recruit-tls
  rules:
    - host: recruit.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: alshaya-recruit
                port: { number: 80 }
---
apiVersion: v1
kind: Secret
metadata:
  name: alshaya-recruit-secrets
  namespace: alshaya-recruit
type: Opaque
stringData:
  DATABASE_URL: "postgresql://recruit:replace-me@postgres:5432/recruit?sslmode=require"
  AUTH_SECRET: "replace-me-with-32-char-hex-string"
  GOOGLE_GEMINI_API_KEY: ""
  GOOGLE_GEMINI_MODEL: "gemini-2.5-flash"
  AZURE_OPENAI_API_KEY: ""
  AZURE_OPENAI_ENDPOINT: ""
  AZURE_OPENAI_DEPLOYMENT: ""
  TAVILY_API_KEY: ""
  AZURE_STORAGE_CONNECTION_STRING: ""
  AZURE_BLOB_CONTAINER: "resumes"
  AZURE_SERVICE_BUS_CONNECTION_STRING: ""
  AZURE_SERVICE_BUS_QUEUE: "scoring-jobs"
